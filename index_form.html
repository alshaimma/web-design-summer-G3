<!DOCTYPE html>
<html>
<head>
    <title>Form</title>
</head>

<body>

<h2></h2>Form</h2>

<form>

<fieldset>

<legend>User Personal Information</legend>

<label>First Name</label><br>
<input type="text" name="fname" maxlength="5" pattern="[A-Za-z]+" required>

<br><br>

<label>Email</label><br>
<input type="email" name="email"
pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
required>

<br><br>

<label>Phone</label><br>
<input type="tel" name="phone"
pattern="(010|011|012|015)[0-9]{8}"
maxlength="11"
required>

<br><br>

<label>Image</label><br>
<input type="file" name="image" accept=".png">

<br><br>

<label>Courses</label><br>

<input list="courses" name="course">

<datalist id="courses">
    <option value="HTML">
    <option value="CSS">
    <option value="JavaScript">
    <option value="Python">
    <option value="PHP">
</datalist>

<br><br>

<label>Date</label><br>
<input type="date" name="date" required>

<br><br>

<label>Comment</label><br>
<input type="text" name="comment"
pattern="[A-Za-z ]+"
required>

<br><br>

<label>Range</label><br>

100
<input type="range" name="range" min="100" max="200" value="150">
200

<br><br>

<label>Gender</label><br>

<input type="radio" name="gender" value="Male" checked>
Male

<input type="radio" name="gender" value="Female">
Female

<br><br>

<label>Tracks</label><br>

<input type="checkbox" name="track1" value="backend">
Backend

<input type="checkbox" name="track2" value="frontend">
Frontend

<input type="checkbox" name="track3" value="fullstack">
Full Stack

<br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</fieldset>

</form>

</body>
</html>
